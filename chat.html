<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FAQ Chatbot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh}
.box{width:400px;height:580px;background:#16213e;border-radius:14px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px #0006}
.hdr{background:linear-gradient(135deg,#667eea,#764ba2);padding:14px;color:#fff;font-weight:bold}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.m{max-width:80%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.4}
.b{align-self:flex-start;background:#0f3460;color:#ddd}
.u{align-self:flex-end;background:#667eea;color:#fff}
.mt{font-size:10px;color:#888;margin-top:3px}
.inp{display:flex;padding:10px;background:#0f0f23;gap:6px}
.inp input{flex:1;padding:9px 14px;border-radius:18px;border:1px solid #333;background:#1a1a2e;color:#fff;outline:none;font-size:13px}
.inp button{width:38px;height:38px;border-radius:50%;border:none;background:#667eea;color:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="box">
  <div class="hdr">🤖 FAQ Assistant</div>
  <div class="msgs" id="ms">
    <div class="m b">Hello! Ask me any question 👋</div>
  </div>
  <div class="inp">
    <input id="i" placeholder="Ask something..." onkeydown="event.key==='Enter'&&go()">
    <button onclick="go()">➤</button>
  </div>
</div>
<script>
const ms=document.getElementById('ms'),i=document.getElementById('i');

function add(text, isUser, meta=''){
  const d = document.createElement('div');
  d.className = 'm ' + (isUser ? 'u' : 'b');
  d.innerHTML = text + (meta ? `<div class="mt">${meta}</div>` : '');
  ms.appendChild(d);
  ms.scrollTop = ms.scrollHeight;
}

async function go(){
  const text = i.value.trim();
  if(!text) return;
  i.value = '';
  add(text, 1);
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    const data = await res.json();
    const meta = data.matched ? `📌 ${data.matched} (${Math.round(data.confidence * 100)}%)` : '';
    setTimeout(() => add(data.response, 0, meta), 350);
  } catch(e) {
    add("⚠️ Connection error", 0);
  }
}

i.focus();
</script>
</body>
</html>
